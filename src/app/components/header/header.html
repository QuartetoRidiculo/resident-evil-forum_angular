<header>
   <a routerLink="/">
    <img src="assets/images/logo_RE.png" alt="Logo do Resident Evil" />
  </a>

  <nav>
    <ul>
      @for (link of links; track link.name) {
        <li>
          <a [routerLink]="link.href">{{ link.name }}</a>
        </li>
      }
    </ul>
  </nav>
  <div class="dnick">
    <img class="imgnick" src="assets/images/nick.png" alt="avatar">
    <p class="nick">{{nome}}</p>
  </div>
</header>
